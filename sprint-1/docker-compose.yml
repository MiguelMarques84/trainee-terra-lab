services:
 
     postgres:
        image: postgres
        container_name: postgres
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: 123456
            POSTGRES_DB: mydb
        ports:
            - "5432:5432"
        volumes:
            - ./data:/var/lib/postgresql/data

     airflow:
        image: apache/airflow:2.5.1
        container_name: airflow
        ports:
            - "8080:8080"
        depends_on:
            - postgres         

